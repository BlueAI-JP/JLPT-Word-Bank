name: Deploy to VPS

on:
  push:
    branches: [ master ]
  workflow_dispatch:      # 允許手動觸發

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            echo "=== 開始部署 $(date) ==="
            bash /var/www/jlpt-word-bank/deploy/deploy.sh
            echo "=== 部署完成 ==="
